<!doctype html>
<html lang="en">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/personal-website.css" />

    <!-- Custom JS -->
    <script src="js/personal-website.js"></script>

    <!-- Main code -->

        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">

            <li class="nav-item">

      <div class="container">

    </section>

    <section id="projects">
      <div class="container">

      </div>
    </section>
    <!-- Contact section -->
    <section id="contact">
      <div class="container">
        <h2>Contact</h2>
      </div>
    </section>
    <!-- Footer section -->
    <footer>
      <div class="container">
        <p>Mateo Posada - Personal Website - 2026</p>
